<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - New Pizza Hut</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>Admin Security</h2>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <br>
            <button class="btn" id="loginBtn">Access Dashboard</button>
        </div>
    </div>

    <div id="adminContent">
        <header class="topbar">
            <h1>⚙️ Admin Panel</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab('sales')">📊 Sales</button>
                <button class="nav-btn" onclick="switchTab('menu')">🍔 Menu Edit</button>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-lock" id="logoutBtn">🔒 Lock</button>
                <button class="btn btn-danger" onclick="window.location.href='index.html'">Exit to POS</button>
            </div>
        </header>

        <main class="main-workspace">
            
            <div id="salesSection" class="section active">
                
                <div class="filter-controls">
                    <div class="filter-row">
                        <button class="filter-btn active" data-filter="days" data-val="1">1 Day (Today)</button>
                        <button class="filter-btn" data-filter="days" data-val="7">1 Week</button>
                        <button class="filter-btn" data-filter="days" data-val="30">1 Month</button>
                        
                        <span class="divider">|</span>
                        <span class="date-label">Pick Date: </span>
                        <input type="date" id="customDateSearch">
                    </div>
                    <button class="btn btn-refresh" id="refreshBtn">🔄 Refresh Data</button>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Revenue</h3>
                        <div class="value" id="totalRevenueBox">₹0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div class="value" id="totalOrdersBox" style="color: #38bdf8;">0</div>
                    </div>
                </div>

                <div class="section-header">Item-wise Sales Breakdown</div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th class="text-right">Qty Sold</th>
                                <th class="text-right">Revenue (₹)</th>
                            </tr>
                        </thead>
                        <tbody id="salesTableBody">
                            </tbody>
                    </table>
                </div>

                <div class="section-header dashed-top">Recent Bills (Spoof Testing)</div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Time / Date</th>
                                <th>Table & Customer</th>
                                <th class="text-right">Bill Amount (₹)</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="billsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="menuSection" class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div class="section-header" style="margin: 0; border: none;">Menu Management</div>
                    <button class="btn" style="background: #10b981;">+ Add New Item</button>
                </div>
                <div class="loading">Menu Edit feature coming next! 🚧</div>
            </div>

        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>
</html>
