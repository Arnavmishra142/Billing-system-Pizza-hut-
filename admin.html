<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - New Pizza Hut</title>
    <style>
        /* =========================================
           BASE STYLES & LOGIN
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #f8fafc; height: 100vh; overflow: hidden; }
        
        .login-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 16px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        .login-box h2 { margin-bottom: 20px; color: #38bdf8; }
        .login-box input { padding: 15px; font-size: 1.5rem; width: 150px; text-align: center; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 20px; letter-spacing: 5px; outline: none; }
        .login-box input:focus { border-color: #38bdf8; }
        .btn { padding: 12px 25px; background: #38bdf8; color: #0f172a; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn:hover { background: #0ea5e9; }
        .btn-danger { background: #ef4444; color: white; padding: 6px 12px; font-size: 0.9rem; border-radius: 4px; border: none; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        
        /* =========================================
           DASHBOARD LAYOUT
           ========================================= */
        #adminContent { display: none; height: 100vh; flex-direction: column; }
        .topbar { background: #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .topbar h1 { font-size: 1.5rem; color: #38bdf8; }
        .nav-tabs { display: flex; gap: 15px; }
        .nav-btn { background: transparent; color: #94a3b8; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 6px; transition: 0.2s; }
        .nav-btn.active { background: #38bdf8; color: #0f172a; }
        .nav-btn:hover:not(.active) { color: white; background: #334155; }
        .topbar-actions { display: flex; gap: 10px; }
        
        .main-workspace { padding: 30px; overflow-y: auto; flex-grow: 1; }
        .section { display: none; }
        .section.active { display: block; }

        /* =========================================
           SALES SECTION (CLEAN UI)
           ========================================= */
        .filter-row { display: flex; gap: 10px; margin-bottom: 30px; align-items: center; flex-wrap: wrap; }
        .filter-btn { padding: 10px 20px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .filter-btn.active { background: #10b981; color: white; border-color: #10b981; }
        
        input[type="date"] { color-scheme: dark; padding: 8px 15px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; font-weight: bold; outline: none; }
        input[type="date"]:focus { border-color: #38bdf8; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; }
        .stat-card h3 { color: #94a3b8; font-size: 1rem; margin-bottom: 10px; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; color: #10b981; }

        .data-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        .data-table th { background: #0f172a; color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; }
        .data-table tr:hover { background: #334155; }

        .text-right { text-align: right !important; }
        .text-center { text-align: center !important; }
        .loading { text-align: center; color: #94a3b8; font-size: 1.2rem; padding: 50px; }
    </style>
</head>
<body>

    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h2>Admin Security</h2>
            <input type="password" id="pinInput" maxlength="4" placeholder="••••">
            <br>
            <button class="btn" id="loginBtn">Access Dashboard</button>
        </div>
    </div>

    <div id="adminContent">
        <header class="topbar">
            <h1>⚙️ Admin Panel</h1>
            <div class="nav-tabs">
                <button class="nav-btn active" onclick="switchTab('sales')">📊 Sales</button>
                <button class="nav-btn" onclick="switchTab('menu')">🍔 Menu Edit</button>
            </div>
            <div class="topbar-actions">
                <button class="btn" id="logoutBtn" style="background: #f59e0b; color: white;">🔒 Lock</button>
                <button class="btn" onclick="window.location.href='index.html'" style="background: #ef4444; color: white;">Exit to POS</button>
            </div>
        </header>

        <main class="main-workspace">
            
            <div id="salesSection" class="section active">
                
                <div class="filter-row">
                    <button class="filter-btn active" data-filter="days" data-val="1">1 Day (Today)</button>
                    <button class="filter-btn" data-filter="days" data-val="7">1 Week</button>
                    <button class="filter-btn" data-filter="days" data-val="30">1 Month</button>
                    
                    <span style="color: #94a3b8; margin: 0 10px;">|</span>
                    <span style="color: #cbd5e1; font-weight: bold; margin-right: 5px;">Pick Date: </span>
                    <input type="date" id="customDateSearch">
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Revenue</h3>
                        <div class="value" id="totalRevenueBox">₹0</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div class="value" id="totalOrdersBox" style="color: #38bdf8;">0</div>
                    </div>
                </div>

                <h3 style="margin-bottom: 15px; color: #e2e8f0;">Item-wise Sales Breakdown</h3>
                <table class="data-table" style="margin-bottom: 40px;">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th class="text-right">Qty Sold</th>
                            <th class="text-right">Revenue (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="salesTableBody">
                        </tbody>
                </table>

                <h3 style="margin-bottom: 15px; color: #e2e8f0; border-top: 1px dashed #334155; padding-top: 20px;">Recent Bills (Spoof Testing)</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Time / Date</th>
                            <th>Table & Customer</th>
                            <th class="text-right">Bill Amount (₹)</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="billsTableBody">
                        </tbody>
                </table>
            </div>

            <div id="menuSection" class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #e2e8f0;">Menu Management</h2>
                    <button class="btn">+ Add New Item</button>
                </div>
                <div class="loading">Menu Edit features coming up next! 🚧</div>
            </div>

        </main>
    </div>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // LOGIN & SESSION LOGIC (NEW UPDATE)
        // ==========================================
        
        // Page load hone par check karo ki kya admin pehle se logged in hai
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'flex';
                loadSalesData('days', 1); // Load dashboard directly
            }
        });

        // Login Button Click
        document.getElementById('loginBtn').addEventListener('click', () => {
            const pin = document.getElementById('pinInput').value;
            if(pin === "1414") { 
                localStorage.setItem('adminLoggedIn', 'true'); // Save login state
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'flex';
                loadSalesData('days', 1); 
            } else {
                alert("Incorrect PIN!");
                document.getElementById('pinInput').value = '';
            }
        });

        // Lock (Logout) Button Click
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminLoggedIn'); // Remove login state
            
            document.getElementById('adminContent').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('pinInput').value = ''; // Clear input field
        });


        // --- TAB SWITCHING ---
        window.switchTab = function(tabName) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabName + 'Section').classList.add('active');
            event.target.classList.add('active');
        }

        // --- SALES LOGIC & FIREBASE FETCH ---
        let allSales = []; 

        async function fetchAllSalesFromDB() {
            try {
                document.getElementById('salesTableBody').innerHTML = '<tr><td colspan="3" class="loading">Fetching data from Cloud... ☁️</td></tr>';
                document.getElementById('billsTableBody').innerHTML = '<tr><td colspan="4" class="loading">Fetching bills...</td></tr>';
                
                const querySnapshot = await getDocs(collection(db, "sales_history"));
                allSales = [];
                querySnapshot.forEach((doc) => {
                    let data = doc.data();
                    data.id = doc.id; 
                    allSales.push(data);
                });
            } catch (error) {
                console.error("Error fetching sales: ", error);
                alert("Sales fetch karne me error aayi.");
            }
        }

        window.loadSalesData = async function(filterType, filterValue) {
            if (allSales.length === 0) await fetchAllSalesFromDB();

            const now = new Date();
            let filteredSales = [];

            allSales.forEach(sale => {
                const saleDate = new Date(sale.timestamp);
                
                if (filterType === 'date') {
                    const pickedDate = new Date(filterValue).toDateString();
                    if (saleDate.toDateString() === pickedDate) {
                        filteredSales.push(sale);
                    }
                } 
                else if (filterType === 'days') {
                    const diffTime = Math.abs(now - saleDate);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 

                    if (filterValue === 1) {
                        if (saleDate.toDateString() === now.toDateString()) filteredSales.push(sale);
                    } else {
                        if (diffDays <= filterValue) filteredSales.push(sale);
                    }
                }
            });

            filteredSales.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            let totalRevenue = 0;
            let itemStats = {}; 

            const billsTbody = document.getElementById('billsTableBody');
            billsTbody.innerHTML = '';

            if (filteredSales.length === 0) {
                billsTbody.innerHTML = '<tr><td colspan="4" class="text-center" style="padding:20px; color:#64748b;">No bills found for this period.</td></tr>';
            }

            filteredSales.forEach(sale => {
                totalRevenue += sale.total;
                
                sale.items.forEach(item => {
                    if (!itemStats[item.name]) itemStats[item.name] = { qty: 0, rev: 0 };
                    itemStats[item.name].qty += item.qty;
                    itemStats[item.name].rev += (item.qty * item.price);
                });

                const timeString = new Date(sale.timestamp).toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' });
                const tableName = sale.table.includes('Parcel') ? sale.table : `${sale.table} [${sale.customer}]`;
                
                billsTbody.innerHTML += `
                    <tr>
                        <td style="color: #94a3b8;">${timeString}</td>
                        <td style="font-weight: bold; color: #f8fafc;">${tableName}</td>
                        <td class="text-right" style="color: #10b981; font-weight: bold;">₹${sale.total}</td>
                        <td class="text-center">
                            <button class="btn btn-danger" onclick="deleteSale('${sale.id}')">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalRevenueBox').innerText = `₹${totalRevenue}`;
            document.getElementById('totalOrdersBox').innerText = filteredSales.length;

            const salesTbody = document.getElementById('salesTableBody');
            salesTbody.innerHTML = '';

            let sortedItems = Object.keys(itemStats).map(key => {
                return { name: key, qty: itemStats[key].qty, rev: itemStats[key].rev };
            }).sort((a, b) => b.qty - a.qty);

            if (sortedItems.length === 0) {
                salesTbody.innerHTML = '<tr><td colspan="3" class="text-center" style="padding:30px; color:#64748b;">No items sold.</td></tr>';
            } else {
                sortedItems.forEach(stat => {
                    salesTbody.innerHTML += `
                        <tr>
                            <td style="font-weight: bold; color: #f8fafc;">${stat.name}</td>
                            <td class="text-right" style="color: #38bdf8; font-weight: bold;">${stat.qty}</td>
                            <td class="text-right" style="color: #10b981; font-weight: bold;">₹${stat.rev}</td>
                        </tr>
                    `;
                });
            }
        }

        window.deleteSale = async function(saleId) {
            const confirmDelete = confirm("Are you sure you want to delete this bill? This cannot be undone.");
            if (confirmDelete) {
                try {
                    await deleteDoc(doc(db, "sales_history", saleId));
                    allSales = [];
                    await fetchAllSalesFromDB();
                    
                    const activeBtn = document.querySelector('.filter-btn.active');
                    if(activeBtn) {
                        activeBtn.click(); 
                    } else {
                        const dateVal = document.getElementById('customDateSearch').value;
                        loadSalesData('date', dateVal);
                    }
                    alert("Bill successfully deleted!");
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    alert("Delete karne mein problem aayi.");
                }
            }
        }

        // --- FILTER BUTTON LISTENERS ---
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                document.getElementById('customDateSearch').value = '';
                
                const days = parseInt(e.target.dataset.val);
                loadSalesData('days', days);
            });
        });

        document.getElementById('customDateSearch').addEventListener('change', (e) => {
            if (e.target.value) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                loadSalesData('date', e.target.value);
            }
        });
    </script>
</body>
</html>
