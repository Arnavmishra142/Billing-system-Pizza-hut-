<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - New Pizza Hut & Live Cake</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- YAHAN NAYA POS MANIFEST LINK KIYA HAI -->
    <link rel="manifest" href="pos-manifest.json">
</head>
<body>
    <div id="screen-home" class="screen active">
        <div class="welcome-banner" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2>NEW PIZZA HUT & LIVE CAKE</h2>
                <p>Billing Dashboard</p>
            </div>
            
            <!-- INSTALL BUTTON -->
            <button id="posPwaBtn" style="display: none; background: #8b5cf6; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                ⬇️ Install POS App
            </button>
        </div>
        
        <div class="home-grid">
            <button class="menu-big-btn" id="btn-tables" style="background: linear-gradient(135deg, #4f46e5, #6366f1);">
                <span class="icon">🪑</span>
                <span class="title">Dine-In Tables</span>
            </button>
            
            <button class="menu-big-btn" id="btn-parcel" style="background: linear-gradient(135deg, #0ea5e9, #38bdf8);">
                <span class="icon">📦</span>
                <span class="title">Takeaway Parcel</span>
            </button>

            <button class="menu-big-btn" id="btn-direct-sale" style="background: linear-gradient(135deg, #10b981, #34d399); grid-column: span 2;">
                <span class="icon">⚡</span>
                <span class="title">Quick Sale Entry</span>
            </button>
            
            <button class="menu-big-btn" onclick="window.location.href='expense.html'" style="background: linear-gradient(135deg, #f43f5e, #e11d48);">
                <span class="icon">💸</span><span class="title">Add Expense</span>
            </button>
        </div>

        <div style="margin-top: 40px; padding: 0 20px;">
            <h3 style="color: #4b5563; margin-bottom: 15px;">Running Orders (Hold / Active)</h3>
            <div class="running-orders-grid" id="runningOrdersContainer">
            </div>
        </div>
    </div>

    <div id="screen-grid" class="screen hidden">
        <header class="top-nav">
            <button id="backToHomeBtn" class="back-btn">⬅ Back</button>
            <h2 id="gridTitle">Select Option</h2>
        </header>
        <div class="table-grid" id="dynamicGrid">
        </div>
    </div>

    <div id="screen-pos" class="screen hidden">
        <header class="top-nav pos-header">
            <button id="backToTablesBtn" class="back-btn">⬅ Back to Grid</button>
            <h2 id="activeTableName">Table / Parcel</h2>
            
            <div class="customer-tabs" id="customerTabsContainer">
                <button class="tab active" data-id="C1">Customer 1</button>
                <button class="tab add-tab-btn" id="addCustomerBtn">+</button>
            </div>
        </header>

        <div class="pos-layout">
            <aside class="sidebar" id="categoryList">
            </aside>

            <main class="main-content">
                <div class="search-bar" style="display: flex; gap: 10px;">
                    <input type="text" id="searchInput" placeholder="Search items..." style="flex-grow: 1;">
                    <button id="qckAddBtn" class="btn btn-details" style="padding: 10px 15px; flex-shrink: 0; font-size: 0.9rem;">+ Quick Add</button>
                </div>

                <div class="items-grid" id="itemsGrid">
                </div>
            </main>

            <aside class="cart-panel">
                <div class="cart-items" id="cartItems">
                </div>
                
                <div class="billing-section">
                    <div class="total-row">
                        <span>Total:</span>
                        <span id="cartTotal" class="total-amount">₹0.00</span>
                    </div>
                    <div class="action-grid">
                        <button class="btn btn-hold" id="holdBtn">HOLD</button>
                        <button class="btn btn-kot" id="kotBtn">KOT</button>
                        <button class="btn btn-checkout" id="checkoutBtn">Bill & Settle</button>
                        <button class="btn btn-details" id="saveExitBtn" style="background:#dc2626;">SAVE & EXIT</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- MODALS -->
    <div id="checkoutModal" class="modal hidden">
        <div class="modal-content">
            <h3>Enter Customer Details</h3>
            <input type="number" id="customerPhone" placeholder="Phone Number">
            <input type="text" id="customerName" placeholder="Name">
            <div class="modal-actions">
                <button id="cancelCheckoutBtn" class="btn btn-cancel">Cancel</button>
                <button id="printBillBtn" class="btn btn-print">Print Bill</button>
            </div>
        </div>
    </div>
    
    <div id="quickAddChoiceModal" class="modal hidden">
        <div class="modal-content">
            <h3>Quick Add Option</h3>
            <p style="text-align: center; color: #6b7280; margin-bottom: 15px;">Kahan add karna hai?</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="btnAddToBillOnly" class="btn btn-hold">📝 Add to THIS Bill Only</button>
                <button id="btnAddToMenu" class="btn btn-kot">🌍 Add to Global Menu</button>
            </div>
            <button id="closeChoiceModalBtn" class="btn btn-cancel" style="margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <div id="billOnlyModal" class="modal hidden">
        <div class="modal-content">
            <h3>Add Custom Item to Bill</h3>
            <input type="text" id="tempItemName" placeholder="Item Name (e.g. Dairy Milk)">
            <input type="number" id="tempItemPrice" placeholder="Price (₹)">
            <div class="modal-actions">
                <button id="cancelBillOnlyBtn" class="btn btn-cancel">Cancel</button>
                <button id="saveToBillBtn" class="btn btn-print">Add to Bill</button>
            </div>
        </div>
    </div>

    <div id="globalMenuModal" class="modal hidden">
        <div class="modal-content">
            <h3>Add New Item to Menu</h3>
            <input type="text" id="globalItemName" placeholder="Item Name">
            <input type="number" id="globalItemPrice" placeholder="Price (₹)">
            
            <input list="categoryOptions" id="globalItemCategory" placeholder="Select or Type Category">
            <datalist id="categoryOptions">
            </datalist>

            <div class="modal-actions">
                <button id="cancelGlobalBtn" class="btn btn-cancel">Cancel</button>
                <button id="saveGlobalBtn" class="btn btn-print">Save to Menu</button>
            </div>
        </div>
    </div>
    
    <div id="printArea"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/tables.js"></script>
    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
    
    <!-- ADVANCED PWA INSTALL LOGIC FOR POS -->
    <script>
        let posDeferredPrompt;
        const posPwaBtn = document.getElementById('posPwaBtn');

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) {
            console.log("App is already running as a PWA (Standalone).");
            if(posPwaBtn) posPwaBtn.style.display = 'none';
        } else {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then((reg) => {
                    console.log("POS Service Worker Active! Scope:", reg.scope);
                }).catch(err => console.log("SW Error:", err));
            }

            window.addEventListener('beforeinstallprompt', (e) => {
                console.log("Browser allowed PWA Install!");
                e.preventDefault();
                posDeferredPrompt = e;
                if(posPwaBtn) {
                    posPwaBtn.style.display = 'block';
                }
            });

            if(posPwaBtn) {
                posPwaBtn.addEventListener('click', async () => {
                    if (posDeferredPrompt) {
                        posDeferredPrompt.prompt();
                        const { outcome } = await posDeferredPrompt.userChoice;
                        if (outcome === 'accepted') {
                            console.log('POS App Installed by user!');
                        }
                        posDeferredPrompt = null;
                        posPwaBtn.style.display = 'none'; 
                    } else {
                        alert("Bhai, Install prompt ready nahi hai. Ya toh tu 'Incognito' me hai, ya ye App pehle se tere phone me install ho chuki hai (App drawer check kar).");
                    }
                });
            }

            window.addEventListener('appinstalled', () => {
                console.log("App installed successfully.");
                if(posPwaBtn) posPwaBtn.style.display = 'none';
            });
        }
    </script>
</body>
</html>
