    <!-- =========================================
         INLINE CSS FIXES FOR FLOATING BUTTON & SCROLL
         ========================================= -->
    <style>
        /* 1. View Details & Pay Button - Centered above bottom bar */
        .floating-cart-btn {
            position: fixed !important;
            bottom: 95px !important; /* Bottom black bar ke theek upar */
            left: 50% !important;
            transform: translateX(-50%) !important;
            right: auto !important;
            background: linear-gradient(135deg, #4f46e5, #6366f1) !important;
            color: white !important;
            border: 3px solid #ffffff !important; /* Extra highlight */
            border-radius: 50px !important;
            padding: 12px 25px !important;
            font-size: 1.2rem !important;
            font-weight: 900 !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4) !important;
            z-index: 9999 !important;
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
        }
        .floating-cart-btn:active { 
            transform: translateX(-50%) scale(0.95) !important; 
        }
        .fab-badge {
            background: white;
            color: #4f46e5;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 900;
        }

        /* 2. Items Grid Scroll Fix (Button ke neeche space) */
        .items-grid {
            padding-bottom: 130px !important; /* Items button ke piche nahi fasenge */
        }

        /* 3. Category Sidebar Scroll Fix */
        .sidebar {
            padding-bottom: 90px !important; 
        }

        /* 4. Cart Drawer Header Styling */
        .cart-header-pro {
            background: #1f2937; 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: white;
            border-bottom: 3px solid #374151;
        }
        .close-cart-btn {
            background: #ef4444; 
            border: none; 
            color: white; 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
        }
    </style>
</head>

     <script>
        let posPrompt;
        const posBtn = document.getElementById('posPwaBtn');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            posPrompt = e;
            if(posBtn) posBtn.style.display = 'inline-block';
        });

        if(posBtn) {
            posBtn.addEventListener('click', () => {
                if(posPrompt) {
                    posPrompt.prompt();
                    posPrompt.userChoice.then(() => {
                        posBtn.style.display = 'none';
                        posPrompt = null;
                    });
                }
            });
        }

        window.addEventListener('appinstalled', () => {
            if(posBtn) posBtn.style.display = 'none';
        });
    </script>
    
    <script>
        // ==========================================
        // 🕒 24-HOUR HISTORY LOGIC (GLOBAL)
        // ==========================================
        function getGhostHistory() {
            try {
                const raw = localStorage.getItem('pos_24h_history');
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (e) {
                console.error("History data corrupt tha, reset kar diya:", e);
                return [];
            }
        }

        window.openHistoryDrawer = function() {
            document.getElementById('historyDrawer').classList.add('open');
            document.getElementById('historyOverlay').classList.add('open');
            renderHistoryBills();
        }

        window.closeHistoryDrawer = function() {
            document.getElementById('historyDrawer').classList.remove('open');
            document.getElementById('historyOverlay').classList.remove('open');
        }

        window.saveToGhostHistory = function(orderNumber, totalAmount, cartItems) {
            let history = getGhostHistory();
            const newBill = {
                id: orderNumber || "ORD-" + Math.floor(Math.random() * 10000),
                timeStr: new Date().toLocaleString('en-IN', { hour12: true }),
                timestamp: Date.now(),
                total: totalAmount,
                items: cartItems || [] 
            };
            history.unshift(newBill); 
            localStorage.setItem('pos_24h_history', JSON.stringify(history));
        }

        function renderHistoryBills() {
            const list = document.getElementById('historyList');
            let history = getGhostHistory();
            const now = Date.now();
            const twentyFourHours = 24 * 60 * 60 * 1000;

            history = history.filter(bill => (now - bill.timestamp) <= twentyFourHours);
            localStorage.setItem('pos_24h_history', JSON.stringify(history));

            list.innerHTML = "";
            if (history.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#94a3b8;'>Koi recent bills nahi hain.</p>";
                return;
            }

            history.forEach(bill => {
                list.innerHTML += `
                    <div class="history-card">
                        <p><strong>Order No:</strong> ${bill.id}</p>
                        <p><strong>Time:</strong> ${bill.timeStr}</p>
                        <p><strong>Amount:</strong> ₹${bill.total}</p>
                        <div style="display: flex; gap: 8px; margin-top: 10px;">
                            <button class="btn-reprint" style="flex: 1;" onclick="reprintGhostBill('${bill.id}')">🖨️ Print</button>
                            <button class="btn-delete-ghost" onclick="deleteGhostBill('${bill.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        window.deleteGhostBill = function(billId) {
            let history = getGhostHistory();
            history = history.filter(b => b.id !== billId);
            localStorage.setItem('pos_24h_history', JSON.stringify(history));
            renderHistoryBills(); 
        }

        window.reprintGhostBill = function(billId) {
            let history = getGhostHistory();
            const bill = history.find(b => b.id === billId);

            if (!bill) {
                alert("Error: Bill data nahi mila!");
                return;
            }

            if (!Array.isArray(bill.items) || bill.items.length === 0) {
                alert("Is bill ke items save nahi hue the, print nahi ho sakta.");
                return;
            }

            const centerText = (text) => {
                if (text.length >= 32) return text.substring(0, 32);
                const spaces = Math.floor((32 - text.length) / 2);
                return " ".repeat(spaces) + text;
            };

            const rightText = (text) => {
                if (text.length >= 32) return text.substring(0, 32);
                const spaces = 32 - text.length;
                return " ".repeat(spaces) + text;
            };

            let billText = "\n";
            billText += centerText("NEW PIZZA HUT") + "\n";
            billText += centerText("Live Cake | Salempur") + "\n";
            
            billText += "--------------------------------\n";
            billText += `Order: ${bill.id}\n`;
            billText += `Date: ${bill.timeStr}\n`;
            billText += "--------------------------------\n";
            billText += "Item                Qty      Amt\n";
            billText += "--------------------------------\n";
            
            bill.items.forEach(item => {
                let n = item.name.length > 16 ? item.name.substring(0, 14) + ".." : item.name.padEnd(16, " ");
                let q = String(item.qty).padStart(2, " ") + "x";
                let a = String(item.price * item.qty).padStart(6, " ");
                billText += `${n}    ${q}   ${a}\n`;
            });
            
            billText += "--------------------------------\n";
            billText += rightText(`TOTAL: Rs ${bill.total}`) + "\n";
            billText += "--------------------------------\n";
            billText += centerText("Thank You! Visit Again") + "\n\n";
            
            billText += centerText("--- UPI PAYMENT ---") + "\n";
            billText += centerText("6393349498@fam") + "\n";
            billText += centerText("(Pay via PhonePe/GPay)") + "\n";
            
            billText += "\n\n\n\n"; 
            
            window.location.href = "rawbt:" + encodeURIComponent(billText);
        }

        // ==========================================
        // FLOATING CART DRAWER LOGIC
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const floatingCartBtn = document.getElementById('floatingCartBtn');
            const cartPanel = document.querySelector('.cart-panel');
            const closeCartBtn = document.getElementById('closeCartBtn');
            const backToTablesBtn = document.getElementById('backToTablesBtn');
            
            // Open Drawer
            floatingCartBtn.addEventListener('click', () => {
                cartPanel.classList.add('open');
                floatingCartBtn.style.display = 'none'; 
            });
            
            // Close Drawer
            closeCartBtn.addEventListener('click', () => {
                cartPanel.classList.remove('open');
                floatingCartBtn.style.display = 'flex'; 
            });

            // Agar Back dabayein, toh drawer band karke button wapas dikhao
            if(backToTablesBtn) {
                backToTablesBtn.addEventListener('click', () => {
                    cartPanel.classList.remove('open');
                    floatingCartBtn.style.display = 'flex';
                });
            }

            // Sync Cart Total to Floating Button
            const cartTotalSpan = document.getElementById('cartTotal');
            const fabTotalSpan = document.getElementById('fabTotal');
            
            const observer = new MutationObserver(() => {
                if(fabTotalSpan && cartTotalSpan) {
                    fabTotalSpan.innerText = cartTotalSpan.innerText;
                }
            });
            
            if(cartTotalSpan) {
                observer.observe(cartTotalSpan, { childList: true, characterData: true, subtree: true });
            }
        });
    </script>

    <script>
       // ==========================================
        // 🔊 SOUND EFFECTS
        // pop.sfx.mp3  -> literally har click pe (poore app mein)
        // cash.sfx.mp3 -> Save & Exit aur Bill & Settle pe extra
        // ==========================================
        const popSound = new Audio('sounds/pop.sfx.mp3');
        const cashSound = new Audio('sounds/cash.sfx.mp3');
        popSound.volume = 0.6;
        cashSound.volume = 0.6;
        
        

        // Capture phase pe lagaya hai taaki koi bhi button (chahe uske andar
        // stopPropagation() ho) is se miss na ho - HAR click pe bajega.
        document.addEventListener('click', () => {
            popSound.currentTime = 0;
            popSound.play().catch(() => {});
        }, true);

        document.addEventListener('DOMContentLoaded', () => {
            const checkoutBtn = document.getElementById('checkoutBtn');
            const saveExitBtn = document.getElementById('saveExitBtn');

            [checkoutBtn, saveExitBtn].forEach(btn => {
                if (btn) {
                    btn.addEventListener('click', () => {
                        cashSound.currentTime = 0;
                        cashSound.play().catch(() => {});
                    }, true);
                }
            });
        });
    </script>
