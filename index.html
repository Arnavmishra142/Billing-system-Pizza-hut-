<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System - New Pizza Hut & Live Cake</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="screen-home" class="screen active">
        <header class="top-nav" style="justify-content: center;">
            <h1>New Pizza Hut & Live Cake - POS</h1>
        </header>
        
        <div class="home-options">
            <button id="btn-tables" class="home-btn">
                🍽️ <br> Dine-In (Tables)
            </button>
            <button id="btn-parcel" class="home-btn parcel-btn">
                🛍️ <br> Takeaway (Parcel)
            </button>
        </div>

        <div class="running-orders-section">
            <h3>🔥 Active Orders</h3>
            <div class="running-wrapper" id="runningOrdersContainer">
            </div>
        </div>
    </div>

    <div id="screen-grid" class="screen hidden">
        <header class="top-nav">
            <button id="backToHomeBtn" class="back-btn">⬅ Back</button>
            <h2 id="gridTitle">Select Option</h2>
        </header>
        <div class="table-grid" id="dynamicGrid">
        </div>
    </div>

    <div id="screen-pos" class="screen hidden">
        <header class="top-nav pos-header">
            <button id="backToTablesBtn" class="back-btn">⬅ Back to Grid</button>
            <h2 id="activeTableName">Table / Parcel</h2>
            
            <div class="customer-tabs" id="customerTabsContainer">
                <button class="tab active" data-id="C1">Customer 1</button>
                <button class="tab add-tab-btn" id="addCustomerBtn">+</button>
            </div>
        </header>

        <div class="pos-layout">
            <aside class="sidebar" id="categoryList">
            </aside>

            <main class="main-content">
                                           <div class="search-bar" style="display: flex; gap: 10px;">
                    <input type="text" id="searchInput" placeholder="Search items..." style="flex-grow: 1;">
                    
                    <button id="tempUploadBtn" class="btn btn-hold" style="padding: 10px 15px; flex-shrink: 0; font-size: 0.9rem; background: #ef4444;">⬆ Upload Menu</button>
                    
                    <button id="quickAddBtn" class="btn btn-details" style="padding: 10px 15px; flex-shrink: 0; font-size: 0.9rem;">+ Quick Add</button>
                </div>


                <div class="items-grid" id="itemsGrid">
                </div>
            </main>

            <aside class="cart-panel">
                <div class="cart-items" id="cartItems">
                </div>
                
                <div class="billing-section">
                    <div class="total-row">
                        <span>Total:</span>
                        <span id="cartTotal" class="total-amount">₹0.00</span>
                    </div>
                    <div class="action-grid">
                        <button class="btn btn-hold" id="holdBtn">HOLD</button>
                        <button class="btn btn-kot" id="kotBtn">KOT</button>
                        <button class="btn btn-details" id="detailsBtn">Details</button>
                        <button class="btn btn-checkout" id="checkoutBtn">Bill & Settle</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="checkoutModal" class="modal hidden">
        <div class="modal-content">
            <h3>Enter Customer Details</h3>
            <input type="number" id="customerPhone" placeholder="Phone Number">
            <input type="text" id="customerName" placeholder="Name">
            <div class="modal-actions">
                <button id="cancelCheckoutBtn" class="btn btn-cancel">Cancel</button>
                <button id="printBillBtn" class="btn btn-print">Print Bill</button>
            </div>
        </div>
    </div>
    <div id="quickAddChoiceModal" class="modal hidden">
        <div class="modal-content">
            <h3>Quick Add Option</h3>
            <p style="text-align: center; color: #6b7280; margin-bottom: 15px;">Kahan add karna hai?</p>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button id="btnAddToBillOnly" class="btn btn-hold">📝 Add to THIS Bill Only</button>
                <button id="btnAddToMenu" class="btn btn-kot">🌍 Add to Global Menu</button>
            </div>
            <button id="closeChoiceModalBtn" class="btn btn-cancel" style="margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <div id="billOnlyModal" class="modal hidden">
        <div class="modal-content">
            <h3>Add Custom Item to Bill</h3>
            <input type="text" id="tempItemName" placeholder="Item Name (e.g. Dairy Milk)">
            <input type="number" id="tempItemPrice" placeholder="Price (₹)">
            <div class="modal-actions">
                <button id="cancelBillOnlyBtn" class="btn btn-cancel">Cancel</button>
                <button id="saveToBillBtn" class="btn btn-print">Add to Bill</button>
            </div>
        </div>
    </div>

    <div id="globalMenuModal" class="modal hidden">
        <div class="modal-content">
            <h3>Add New Item to Menu</h3>
            <input type="text" id="globalItemName" placeholder="Item Name">
            <input type="number" id="globalItemPrice" placeholder="Price (₹)">
            
            <input list="categoryOptions" id="globalItemCategory" placeholder="Select or Type Category">
            <datalist id="categoryOptions">
                </datalist>

            <div class="modal-actions">
                <button id="cancelGlobalBtn" class="btn btn-cancel">Cancel</button>
                <button id="saveGlobalBtn" class="btn btn-print">Save to Menu</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/tables.js"></script>
    <script type="module" src="js/menu.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>
</html>
