<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Expense - New Pizza Hut</title>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: #f3f4f6; color: #1f2937; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1f2937; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 15px; }
        .back-btn { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; flex-grow: 1; display: flex; flex-direction: column; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        label { font-weight: bold; margin-bottom: 8px; display: block; color: #4b5563; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1.1rem; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #f43f5e; box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.1); }
        .save-btn { width: 100%; padding: 15px; background: #f43f5e; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .expense-list { flex-grow: 1; overflow-y: auto; }
        .expense-item { display: flex; justify-content: space-between; background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #f43f5e; }
        .expense-note { font-weight: bold; color: #1f2937; }
        .expense-time { font-size: 0.8rem; color: #6b7280; }
        .expense-amt { font-weight: bold; color: #f43f5e; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">⬅ Back</button>
        <h2>💸 Add Expense</h2>
    </div>

    <div class="container">
        <div class="card">
            <label>Amount (₹)</label>
            <input type="number" id="expAmount" placeholder="e.g. 100" autocomplete="off">
            
            <label>Expense Note (Auto-suggests from past)</label>
            <!-- DATALIST MAGIC YAHAN HAI -->
            <input type="text" id="expNote" list="pastNotes" placeholder="e.g. Dhoodh niche wali dukan" autocomplete="off">
            <datalist id="pastNotes"></datalist>

            <button class="save-btn" id="saveExpenseBtn">Save Expense</button>
        </div>

        <h3 style="margin-bottom: 10px; color: #4b5563;">Today's Expenses</h3>
        <div class="expense-list" id="todayExpensesList">
            <div style="text-align: center; color: gray; margin-top: 20px;">Loading today's expenses...</div>
        </div>
    </div>

    <script type="module" src="js/expense.js"></script>
</body>
</html>
