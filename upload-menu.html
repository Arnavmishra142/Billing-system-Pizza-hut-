        const startBtn = document.getElementById('startBtn');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');

        startBtn.addEventListener('click', async () => {
            const totalItems = bulkMenuItems.length;
            const confirmUpload = confirm(`Kkya tum ${totalItems} items upload karna chahte ho?`);
            
            if (!confirmUpload) return;

            startBtn.disabled = true;
            errorBox.style.display = 'none';
            let successCount = 0;

            try {
                // Ek-ek karke upload chalega taaki progress bar update ho sake
                for (let i = 0; i < totalItems; i++) {
                    const item = bulkMenuItems[i];
                    
                    // UI Update
                    statusText.innerText = `Uploading: ${item.name}...`;
                    
                    // Firebase Upload
                    await addDoc(collection(db, "menu_items"), {
                        name: item.name,
                        price: Number(item.price),
                        category: item.category,
                        image: null, 
                        inStock: true
                    });
                    
                    successCount++;
                    
                    // Percentage Calculation
                    const percentage = Math.round((successCount / totalItems) * 100);
                    progressBar.style.width = `${percentage}%`;
                    startBtn.innerText = `UPLOADING... ${percentage}%`;
                }
                
                // Upload Complete
                startBtn.innerText = "✅ 100% COMPLETE!";
                startBtn.style.background = "#059669";
                statusText.innerHTML = `🎉 BOOM! Saare ${successCount} items successfully database mein save ho gaye!<br><br><b>Ab is file ko delete kar de aur apna Admin/POS panel refresh kar.</b>`;
                
            } catch (error) {
                // Agar internet kata ya rule block hua toh yahan fasega
                console.error("Upload Error:", error);
                startBtn.innerText = "❌ FAILED!";
                startBtn.style.background = "#ef4444";
                errorBox.style.display = 'block';
                errorBox.innerText = `ERROR AAYI HAI:\nItem fail hua: ${bulkMenuItems[successCount].name}\nReason: ${error.message}`;
            }
