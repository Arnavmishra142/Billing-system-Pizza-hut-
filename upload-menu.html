        * { box-sizing: border-box; }
        body { font-family: sans-serif; padding: 15px; background: #0f172a; color: white; text-align: center; margin: 0; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-size: 1.4rem; color: #f8fafc; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        
        button { 
            padding: 15px 20px; 
            background: #38bdf8; 
            color: #0f172a;
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1rem; 
            width: 100%; 
            touch-action: manipulation;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); opacity: 0.8; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; transform: none; }
        
        progress { width: 100%; height: 25px; margin-top: 20px; border-radius: 10px; overflow: hidden; display: none; }
        progress::-webkit-progress-bar { background-color: #334155; }
        progress::-webkit-progress-value { background-color: #10b981; }
        
        #logBox { 
            background: #000; 
            color: #10b981; 
            font-family: monospace; 
            height: 350px; 
            overflow-y: auto; 
            text-align: left; 
            padding: 15px; 
            margin-top: 15px; 
            border-radius: 8px; 
            font-size: 0.85rem; 
            border: 1px solid #334155;
            display: block; /* Hamesha dikhega debugging ke liye */
        }
        .log-error { color: #ef4444; }
        .log-success { color: #10b981; }
        .log-info { color: #38bdf8; }
    </style>
