<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Uploader - New Pizza Hut</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #0f172a; color: white; text-align: center; }
        .box { background: #1e293b; padding: 30px; border-radius: 12px; display: inline-block; }
        .status { margin-top: 20px; font-weight: bold; color: #10b981; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🍕 Menu Uploader - Firebase</h2>
        <p>Press `F12` to open the console and see the upload progress.</p>
        <button id="uploadBtn" style="padding: 10px 20px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Start Upload</button>
        <div id="statusText" class="status"></div>
    </div>

    <script type="module">
        // Firebase Modular SDK imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Your exact Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBLzGd0DlItKShk0eJoQR4CjRx1sP3-o-w",
            authDomain: "billing-system-f8531.firebaseapp.com",
            projectId: "billing-system-f8531",
            storageBucket: "billing-system-f8531.firebasestorage.app",
            messagingSenderId: "921228841270",
            appId: "1:921228841270:web:9013d59b3ef96dda40e397",
            measurementId: "G-JMPEJCCBHZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Menu items extracted from your photos
        const menuItems = [
            // --- PIZZA (Divided by sizes) ---
            { name: "Margherita Pizza (Regular)", price: 75, category: "Pizza", inStock: true, image: null },
            { name: "Margherita Pizza (Medium)", price: 160, category: "Pizza", inStock: true, image: null },
            { name: "Margherita Pizza (Large)", price: 240, category: "Pizza", inStock: true, image: null },
            { name: "O.C.T Pizza (Regular)", price: 100, category: "Pizza", inStock: true, image: null },
            { name: "Farmhouse Pizza (Medium)", price: 250, category: "Pizza", inStock: true, image: null },
            { name: "Extra Topping (Cheese)", price: 50, category: "Pizza", inStock: true, image: null },
            
            // --- BURGER ---
            { name: "Veg Burger", price: 50, category: "Burger", inStock: true, image: null },
            { name: "Mexican Burger", price: 60, category: "Burger", inStock: true, image: null },
            { name: "Cheese Burger", price: 70, category: "Burger", inStock: true, image: null },
            { name: "Double Decker Burger", price: 100, category: "Burger", inStock: true, image: null },

            // --- SANDWICH & FRIES ---
            { name: "Classic Sandwich", price: 60, category: "Sandwich", inStock: true, image: null },
            { name: "Cheese Overload Sandwich", price: 90, category: "Sandwich", inStock: true, image: null },
            { name: "French Fry", price: 50, category: "French Fries", inStock: true, image: null },
            { name: "Peri Peri Fry", price: 70, category: "French Fries", inStock: true, image: null },

            // --- CHINESE (Half/Full) ---
            { name: "Veg Manchurian (Half)", price: 80, category: "Chinese Starter", inStock: true, image: null },
            { name: "Veg Manchurian (Full)", price: 150, category: "Chinese Starter", inStock: true, image: null },
            { name: "Hakka Noodles (Half)", price: 60, category: "Noodles", inStock: true, image: null },
            { name: "Hakka Noodles (Full)", price: 110, category: "Noodles", inStock: true, image: null },
            { name: "Veg Fried Rice (Half)", price: 50, category: "Fried Rice", inStock: true, image: null },

            // --- SOUP, ROLL & MAGGIE ---
            { name: "Veg Manchow Soup", price: 60, category: "Soup", inStock: true, image: null },
            { name: "Spring Roll", price: 60, category: "Roll", inStock: true, image: null },
            { name: "Masala Maggie", price: 50, category: "Maggie", inStock: true, image: null },
            { name: "Cheese Maggie", price: 70, category: "Maggie", inStock: true, image: null },

            // --- SHAKES & COFFEE ---
            { name: "Espresso (Cold Coffee)", price: 70, category: "Coffee", inStock: true, image: null },
            { name: "Oreo Shake", price: 90, category: "Shake", inStock: true, image: null },

            // --- CAKE & PASTRY ---
            { name: "Pineapple Pastry", price: 50, category: "Pastry", inStock: true, image: null },
            { name: "Black Forest Cake", price: 300, category: "Cake", inStock: true, image: null },
            { name: "3D Cake", price: 750, category: "Cake", inStock: true, image: null },
            { name: "Stuffed Garlic Bread", price: 60, category: "Garlic Bread", inStock: true, image: null }
            
            // Note: Maine almost har category se data daal diya hai testing ke liye.
            // Jo bach gaye hain, tum aaram se upar wale format ko copy-paste karke add kar sakte ho!
        ];

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const statusText = document.getElementById('statusText');
            const btn = document.getElementById('uploadBtn');
            
            btn.disabled = true;
            btn.innerText = "Uploading... ⏳";
            statusText.innerText = "Check Console (F12) for live progress...";

            let successCount = 0;

            for (let item of menuItems) {
                try {
                    await addDoc(collection(db, "menu_items"), item);
                    console.log(`✅ Uploaded: ${item.name}`);
                    successCount++;
                } catch (e) {
                    console.error(`❌ Failed: ${item.name}`, e);
                }
            }

            statusText.innerText = `🎉 Done! Successfully uploaded ${successCount} items to Firestore.`;
            btn.innerText = "Upload Complete";
        });
    </script>
</body>
</html>
